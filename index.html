<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Node Monitor v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #0f0c14; 
            color: #e2e8f0; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass { 
            background: rgba(30, 25, 35, 0.95); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Status Glow Effects */
        .glow-green { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .glow-blue { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        
        /* The Alarm Animation */
        .alarm-active { 
            animation: critical-pulse 1s infinite; 
            border-color: #ef4444 !important; 
        }

        @keyframes critical-pulse {
            0% { background-color: rgba(30, 25, 35, 0.95); }
            50% { background-color: rgba(80, 20, 20, 1); }
            100% { background-color: rgba(30, 25, 35, 0.95); }
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .scanline {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, .2) 50%);
            background-size: 100% 4px; pointer-events: none; opacity: 0.1;
        }
    </style>
</head>
<body>

    <div id="app-container" class="glass w-full max-w-md rounded-3xl p-8 relative overflow-hidden transition-all duration-500">
        <div class="scanline"></div>

        <div class="flex justify-between items-start mb-12 relative z-20">
            <div>
                <p class="text-purple-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-1">Network Infrastructure</p>
                <h1 class="text-2xl font-bold tracking-tighter">NODE-01 <span class="text-gray-600">/ ALPHA</span></h1>
            </div>
            <div id="icon-container" class="p-3 rounded-2xl bg-white/5 border border-white/10 shadow-inner">
                </div>
        </div>

        <div class="flex flex-col items-center py-4 relative z-20">
            <div id="display-status" class="text-4xl font-black tracking-tighter transition-all duration-150">
                OFFLINE
            </div>
            <div id="sync-timer" class="text-[9px] text-gray-500 mt-2 font-bold uppercase tracking-widest">
                Sync: Disconnected
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-10 relative z-20">
            <div class="metric-card p-4 rounded-2xl">
                <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Thermal</span>
                <span id="temp-val" class="text-xl font-bold tracking-tight">--°C</span>
            </div>
            <div class="metric-card p-4 rounded-2xl">
                <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Load</span>
                <span id="power-val" class="text-xl font-bold tracking-tight">--W</span>
            </div>
            <div class="metric-card p-4 rounded-2xl col-span-2">
                <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Uptime Counter</span>
                <span id="uptime-val" class="text-xl font-bold tracking-tight text-blue-400">00:00:00</span>
            </div>
        </div>

        <div class="mt-10 space-y-4 relative z-20">
            <button id="start-btn" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl transition-all uppercase text-xs tracking-[0.2em]">
                Initialize System
            </button>
            <div class="flex items-center justify-between px-2">
                <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Audio Security</span>
                <button id="alarm-toggle" class="text-[10px] text-red-500 font-bold uppercase hover:text-red-400 transition-colors">
                    [ ALARM MUTED ]
                </button>
            </div>
        </div>
    </div>

<script>
    const API_URL = 'https://689cc60cce755fe69786fca8.mockapi.io/serverinfo';
    
    // Different Synths for different "Moods"
    const pulseSynth = new Tone.MembraneSynth({ volume: -10 }).toDestination();
    const alarmSynth = new Tone.Oscillator(800, "square").toDestination();
    const infoSynth = new Tone.PolySynth(Tone.Synth).toDestination();

    let isRunning = false;
    let alarmArmed = false;
    let soundLoop = null;

    async function updateMonitor() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const server = data[0];
            
            const card = document.getElementById('app-container');
            const statusLabel = document.getElementById('display-status');
            const iconBox = document.getElementById('icon-container');
            
            const timeDiff = Date.now() - parseInt(server.HARTHBEAT);
            const statusClean = server.STATUS.toLowerCase();

            // Clear previous audio loops when data refreshes
            clearInterval(soundLoop);
            soundLoop = null;

            // 1. CRITICAL: PULSE LOST (Internet/Crash)
            if (timeDiff > 10000) {
                statusLabel.innerText = "PULSE LOST";
                iconBox.innerHTML = ICONS.CRITICAL;
                card.className = "glass w-full max-w-md rounded-2xl p-8 relative overflow-hidden alarm-active";
                
                if (alarmArmed) {
                    soundLoop = setInterval(() => {
                        alarmSynth.frequency.value = 800;
                        alarmSynth.start().stop("+0.1");
                    }, 500); // Fast urgent beep
                }
            } 
            
            // 2. MAINTENANCE (Intentional)
            else if (statusClean === 'maintenance') {
                statusLabel.innerText = "MAINTENANCE";
                iconBox.innerHTML = ICONS.MAINT;
                card.className = "glass w-full max-w-md rounded-2xl p-8 relative overflow-hidden status-glow-blue";
                
                if (alarmArmed) {
                    // Soft double-chirp every 5 seconds
                    soundLoop = setInterval(() => {
                        infoSynth.triggerAttackRelease(["C4", "E4"], "16n");
                    }, 5000);
                }
            }

            // 3. OFFLINE (Intentional Hard Switch)
            else if (statusClean === 'offline') {
                statusLabel.innerText = "NODE OFFLINE";
                iconBox.innerHTML = ICONS.OFFLINE;
                card.className = "glass w-full max-w-md rounded-2xl p-8 relative overflow-hidden border-gray-600";
                
                if (alarmArmed) {
                    // Low steady drone every 3 seconds
                    soundLoop = setInterval(() => {
                        pulseSynth.triggerAttackRelease("G0", "8n");
                    }, 3000);
                }
            }

            // 4. STABLE (Normal)
            else if (statusClean === 'online') {
                statusLabel.innerText = "STABLE";
                iconBox.innerHTML = ICONS.ONLINE;
                card.className = "glass w-full max-w-md rounded-2xl p-8 relative overflow-hidden status-glow-green";
                
                if(isRunning) pulseSynth.triggerAttackRelease("C1", "32n");
            }

        } catch (e) {
            statusLabel.innerText = "API ERROR";
        }
    }
    
    // ... rest of the click listeners remain the same ...
</script>
</body>
</html>
