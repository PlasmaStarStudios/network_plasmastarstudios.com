<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Server Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #1a1625; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(43, 33, 51, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(90, 62, 116, 0.5); }
        .status-glow-green { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); border-color: #22c55e; }
        .status-glow-red { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); border-color: #ef4444; }
        .status-glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); border-color: #3b82f6; }
        
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .monitor-screen::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.05); animation: scanline 4s linear infinite;
        }
    </style>
</head>
<body class="flex items-center justify-center min-height-screen p-4">

    <div id="app-container" class="glass w-full max-width-md rounded-2xl p-6 relative overflow-hidden monitor-screen">
        <div class="flex justify-between items-start mb-8">
            <div>
                <h2 class="text-gray-400 text-xs font-bold uppercase tracking-tighter">Primary Node</h2>
                <h1 id="node-id" class="text-xl font-bold">CORE-01</h1>
            </div>
            <div id="icon-container" class="p-3 rounded-xl bg-gray-800/50">
                </div>
        </div>

        <div class="flex flex-col items-center py-6">
            <div class="relative w-full h-24 mb-4 flex items-center justify-center">
                <svg viewBox="0 0 100 20" class="w-full h-full text-green-500 opacity-20 absolute">
                    <path d="M0 10 L30 10 L35 2 L45 18 L50 10 L100 10" fill="none" stroke="currentColor" stroke-width="0.5" />
                </svg>
                <div id="pulse-wave" class="text-4xl font-bold tracking-widest transition-all duration-300">
                    <span id="display-status">INITIALIZING</span>
                </div>
            </div>
            <p id="latency-text" class="text-[10px] text-gray-500 uppercase italic">Last Sync: --ms ago</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mt-4">
            <div class="bg-black/20 p-4 rounded-lg border border-white/5">
                <span class="block text-[10px] text-gray-500 mb-1">THERMAL</span>
                <span id="temp-val" class="text-lg font-bold">--°C</span>
            </div>
            <div class="bg-black/20 p-4 rounded-lg border border-white/5">
                <span class="block text-[10px] text-gray-500 mb-1">LOAD</span>
                <span id="power-val" class="text-lg font-bold">--W</span>
            </div>
            <div class="bg-black/20 p-4 rounded-lg border border-white/5 col-span-2">
                <span class="block text-[10px] text-gray-500 mb-1">UPTIME</span>
                <span id="uptime-val" class="text-lg font-bold">00:00:00</span>
            </div>
        </div>

        <button id="start-btn" class="mt-8 w-full py-4 border border-purple-500/30 bg-purple-500/10 hover:bg-purple-500/20 text-purple-400 font-bold rounded-lg transition-all">
            ENGAGE MONITORING
        </button>
    </div>

<script>
    const API_URL = 'https://689cc60cce755fe69786fca8.mockapi.io/serverinfo';
    const synth = new Tone.MembraneSynth({ volume: -10 }).toDestination();
    let isRunning = false;

    // SVG Icon Templates
    const ICONS = {
        ONLINE: `<svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>`,
        LOST: `<svg class="w-6 h-6 text-orange-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`,
        MAINTENANCE: `<svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`,
        OFFLINE: `<svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>`
    };

    async function updateMonitor() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const server = data[0];
            
            const container = document.getElementById('app-container');
            const iconDiv = document.getElementById('icon-container');
            const statusLabel = document.getElementById('display-status');
            const timeDiff = Date.now() - parseInt(server.HARTHBEAT);

            document.getElementById('latency-text').innerText = `Last Sync: ${timeDiff}ms ago`;
            document.getElementById('temp-val').innerText = server.currenttemp;
            document.getElementById('power-val').innerText = server.powerconcumptionperH;
            document.getElementById('uptime-val').innerText = server.uptime;

            // --- Reset Classes ---
            container.className = "glass w-full max-width-md rounded-2xl p-6 relative overflow-hidden monitor-screen";
            
            // --- Logic Engine ---
            if (timeDiff > 10000) {
                statusLabel.innerText = "NO PULSE";
                iconDiv.innerHTML = ICONS.LOST;
                container.classList.add('status-glow-red');
            } else if (server.STATUS.toLowerCase() === 'maintenance') {
                statusLabel.innerText = "MAINTENANCE";
                iconDiv.innerHTML = ICONS.MAINTENANCE;
                container.classList.add('status-glow-blue');
            } else if (server.STATUS.toLowerCase() === 'online') {
                statusLabel.innerText = "STABLE";
                iconDiv.innerHTML = ICONS.ONLINE;
                container.classList.add('status-glow-green');
                if(isRunning) {
                    synth.triggerAttackRelease("G1", "32n");
                    // Visual "Thump" effect
                    statusLabel.style.transform = "scale(1.1)";
                    setTimeout(() => statusLabel.style.transform = "scale(1)", 100);
                }
            } else {
                statusLabel.innerText = "OFFLINE";
                iconDiv.innerHTML = ICONS.OFFLINE;
                container.classList.add('status-glow-red');
            }

        } catch (e) {
            document.getElementById('display-status').innerText = "DATA ERROR";
        }
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        if (!isRunning) {
            await Tone.start();
            isRunning = true;
            document.getElementById('start-btn').innerText = "MONITORING ACTIVE";
            setInterval(updateMonitor, 2000);
            updateMonitor();
        }
    });
</script>
</body>
</html>
