<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Heartbeat Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        /* Apply a consistent font-family and make the body background responsive */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #2b2133; /* Darker purple background */
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* Style the main dashboard container */
        #app-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #5a3e74; /* Adjusted border to a darker purple shade */
            background-color: #3b2d41; /* Darker purple for the dashboard */
            padding: 1.5rem;
        }
        /* Common SVG icon size and stroke settings */
        .status-icon {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        /* Heartbeat Animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
        }
        .animate-heartbeat {
            animation: heartbeat 1.2s infinite;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold">Server Status</h1>
            <div id="status-light" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]"></div>
        </div>

        <div class="flex flex-col items-center justify-center py-8">
            <svg class="status-icon text-red-500 animate-heartbeat mb-4" viewBox="0 0 24 24">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
            </svg>
            <p id="uptime-text" class="text-sm text-purple-200">System Pulse: Stable</p>
        </div>

        <div class="space-y-3">
            <div class="flex justify-between p-3 bg-[#2b2133] rounded-lg border border-[#5a3e74]">
                <span class="text-gray-300">Main Server</span>
                <span class="text-green-400 font-mono">ONLINE</span>
            </div>
            <div class="flex justify-between p-3 bg-[#2b2133] rounded-lg border border-[#5a3e74]">
                <span class="text-gray-300">Database</span>
                <span class="text-green-400 font-mono">CONNECTED</span>
            </div>
        </div>
        
        <button id="audio-toggle" class="mt-6 w-full py-2 bg-purple-600 hover:bg-purple-500 rounded-md text-sm transition-colors">
            Enable Audio Pulse
        </button>
    </div>

    <script>
        // Tone.js Heartbeat Synth Logic
        const synth = new Tone.MembraneSynth().toDestination();
        let audioEnabled = false;

        document.getElementById('audio-toggle').addEventListener('click', async () => {
            if (!audioEnabled) {
                await Tone.start();
                audioEnabled = true;
                document.getElementById('audio-toggle').innerText = "Mute Audio Pulse";
                playPulse();
            } else {
                audioEnabled = false;
                document.getElementById('audio-toggle').innerText = "Enable Audio Pulse";
            }
        });

        function playPulse() {
            if (audioEnabled) {
                // Classic "lub-dub" heartbeat sound
                synth.triggerAttackRelease("C1", "8n", Tone.now());
                synth.triggerAttackRelease("C1", "8n", Tone.now() + 0.2);
                setTimeout(playPulse, 1200); // Matches the animation speed
            }
        }
    </script>
</body>
</html>
