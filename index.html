<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Heartbeat Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #2b2133;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #app-container {
            width: 100%;
            max-width: 420px;
            border-radius: 1.5rem;
            border: 1px solid #5a3e74;
            background-color: #3b2d41;
            padding: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .heart-icon {
            transition: transform 0.1s ease-in-out;
        }

        .pulse-animation {
            animation: pulse-ring 1.2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(.33); }
            80%, 100% { opacity: 0; }
        }

        .data-value {
            font-family: 'JetBrains Mono', monospace;
            color: #c084fc;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">System Node 01</h1>
                <p id="status-text" class="text-xs text-purple-300 uppercase tracking-widest mt-1">Fetching Data...</p>
            </div>
            <div id="status-indicator" class="w-4 h-4 rounded-full bg-gray-500 transition-colors duration-500"></div>
        </div>

        <div class="relative flex items-center justify-center py-10 mb-6">
            <div id="ring" class="absolute w-24 h-24 rounded-full border-4 border-purple-500 opacity-0"></div>
            <svg id="heart-svg" class="w-16 h-16 text-red-500 heart-icon" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-[#2b2133] p-4 rounded-xl border border-[#5a3e74]">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Temperature</p>
                <p id="temp-val" class="data-value text-lg">--°C</p>
            </div>
            <div class="bg-[#2b2133] p-4 rounded-xl border border-[#5a3e74]">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Consumption</p>
                <p id="power-val" class="data-value text-lg">--W</p>
            </div>
            <div class="bg-[#2b2133] p-4 rounded-xl border border-[#5a3e74] col-span-2">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Uptime</p>
                <p id="uptime-val" class="data-value text-lg">00:00:00</p>
            </div>
        </div>
        
        <button id="start-btn" class="mt-8 w-full py-3 bg-purple-600 hover:bg-purple-500 rounded-xl font-bold transition-all transform active:scale-95 shadow-lg">
            Initialize Monitor
        </button>
    </div>

    <script>
        const API_URL = 'https://689cc60cce755fe69786fca8.mockapi.io/serverinfo';
        const synth = new Tone.MembraneSynth({
            pitchDecay: 0.05,
            octaves: 4,
            oscillator: { type: "sine" }
        }).toDestination();

        let isRunning = false;

        async function updateMonitor() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const server = data[0]; // Get the first object in the array

                // Update UI Text
                document.getElementById('temp-val').innerText = server.currenttemp;
                document.getElementById('power-val').innerText = server.powerconcumptionperH;
                document.getElementById('uptime-val').innerText = server.uptime;
                document.getElementById('status-text').innerText = `Status: ${server.STATUS}`;

                // Update Status Indicator Light
                const indicator = document.getElementById('status-indicator');
                if(server.STATUS.toLowerCase() === 'online') {
                    indicator.className = "w-4 h-4 rounded-full bg-green-500 shadow-[0_0_12px_#22c55e]";
                } else {
                    indicator.className = "w-4 h-4 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444]";
                }

                // Trigger Pulse
                triggerVisualPulse();
                if(isRunning) {
                    synth.triggerAttackRelease("C1", "8n");
                }

            } catch (error) {
                console.error("Failed to fetch server data:", error);
                document.getElementById('status-text').innerText = "CONNECTION LOST";
            }
        }

        function triggerVisualPulse() {
            const heart = document.getElementById('heart-svg');
            const ring = document.getElementById('ring');
            
            // Heart jump
            heart.style.transform = "scale(1.3)";
            setTimeout(() => heart.style.transform = "scale(1)", 150);

            // Ring expansion
            ring.classList.remove('pulse-animation');
            void ring.offsetWidth; // Trigger reflow to restart animation
            ring.classList.add('pulse-animation');
        }

        document.getElementById('start-btn').addEventListener('click', async () => {
            if (!isRunning) {
                await Tone.start();
                isRunning = true;
                document.getElementById('start-btn').innerText = "Stop Monitoring";
                document.getElementById('start-btn').classList.replace('bg-purple-600', 'bg-red-900/50');
                
                // Start polling every 2 seconds
                setInterval(updateMonitor, 2000);
                updateMonitor();
            } else {
                location.reload(); // Simplest way to stop the loops
            }
        });
    </script>
</body>
</html>
