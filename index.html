<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Node Monitor v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            background-color: #0f0c14; 
            color: #e2e8f0; 
            font-family: 'JetBrains Mono', monospace; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass { 
            background: rgba(30, 25, 35, 0.95); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(139, 92, 246, 0.2); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Status Glow Effects */
        .glow-green { border-color: #22c55e; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .glow-blue { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        
        /* The Alarm Animation */
        .alarm-active { 
            animation: critical-pulse 1s infinite; 
            border-color: #ef4444 !important; 
        }

        @keyframes critical-pulse {
            0% { background-color: rgba(30, 25, 35, 0.95); }
            50% { background-color: rgba(80, 20, 20, 1); }
            100% { background-color: rgba(30, 25, 35, 0.95); }
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .scanline {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, .2) 50%);
            background-size: 100% 4px; pointer-events: none; opacity: 0.1;
        }
    </style>
</head>
<body>

    <div id="app-container" class="glass w-full max-w-md rounded-3xl p-8 relative overflow-hidden transition-all duration-500">
        <div class="scanline"></div>

        <div class="flex justify-between items-start mb-12 relative z-20">
            <div>
                <p class="text-purple-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-1">Network Infrastructure</p>
                <h1 class="text-2xl font-bold tracking-tighter">NODE-01 <span class="text-gray-600">/ ALPHA</span></h1>
            </div>
            <div id="icon-container" class="p-3 rounded-2xl bg-white/5 border border-white/10 shadow-inner">
                </div>
        </div>

        <div class="flex flex-col items-center py-4 relative z-20">
            <div id="display-status" class="text-4xl font-black tracking-tighter transition-all duration-150">
                OFFLINE
            </div>
            <div id="sync-timer" class="text-[9px] text-gray-500 mt-2 font-bold uppercase tracking-widest">
                Sync: Disconnected
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-10 relative z-20">
            <div class="metric-card p-4 rounded-2xl">
                <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Thermal</span>
                <span id="temp-val" class="text-xl font-bold tracking-tight">--°C</span>
            </div>
            <div class="metric-card p-4 rounded-2xl">
                <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Load</span>
                <span id="power-val" class="text-xl font-bold tracking-tight">--W</span>
            </div>
            <div class="metric-card p-4 rounded-2xl col-span-2">
                <span class="text-[9px] text-gray-500 font-bold uppercase block mb-1">Uptime Counter</span>
                <span id="uptime-val" class="text-xl font-bold tracking-tight text-blue-400">00:00:00</span>
            </div>
        </div>

        <div class="mt-10 space-y-4 relative z-20">
            <button id="start-btn" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 text-white font-bold rounded-2xl transition-all uppercase text-xs tracking-[0.2em]">
                Initialize System
            </button>
            <div class="flex items-center justify-between px-2">
                <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">Audio Security</span>
                <button id="alarm-toggle" class="text-[10px] text-red-500 font-bold uppercase hover:text-red-400 transition-colors">
                    [ ALARM MUTED ]
                </button>
            </div>
        </div>
    </div>

<script>
    const API_URL = 'https://689cc60cce755fe69786fca8.mockapi.io/serverinfo';
    
    // Audio Engines
    const heartbeatSynth = new Tone.MembraneSynth({ volume: -12 }).toDestination();
    const alertOsc = new Tone.Oscillator(850, "square").toDestination();
    const infoSynth = new Tone.PolySynth(Tone.Synth, { volume: -15 }).toDestination();

    let isRunning = false;
    let alarmArmed = false;
    let currentLoop = null;

    const ICONS = {
        ONLINE: `<svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>`,
        CRITICAL: `<svg class="w-6 h-6 text-red-500 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`,
        MAINT: `<svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`,
        OFFLINE: `<svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>`
    };

    async function updateMonitor() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const server = data[0];
            
            const card = document.getElementById('app-container');
            const statusLabel = document.getElementById('display-status');
            const iconBox = document.getElementById('icon-container');
            const syncLabel = document.getElementById('sync-timer');
            
            const timeDiff = Date.now() - parseInt(server.HARTHBEAT);
            const statusType = server.STATUS.toLowerCase();

            // Reset Audio Loop
            clearInterval(currentLoop);
            currentLoop = null;

            // Update Metrics
            document.getElementById('temp-val').innerText = server.currenttemp;
            document.getElementById('power-val').innerText = server.powerconcumptionperH;
            document.getElementById('uptime-val').innerText = server.uptime;
            syncLabel.innerText = `Sync Offset: ${timeDiff}ms`;

            // --- Priority 1: Pulse Loss (Critical) ---
            if (timeDiff > 10000) {
                statusLabel.innerText = "PULSE LOST";
                statusLabel.className = "text-red-500 font-black tracking-tighter transition-all duration-150";
                iconBox.innerHTML = ICONS.CRITICAL;
                card.className = "glass w-full max-w-md rounded-3xl p-8 relative overflow-hidden alarm-active";
                
                if (alarmArmed) {
                    currentLoop = setInterval(() => {
                        alertOsc.start().stop("+0.1");
                    }, 600);
                }
            } 
            // --- Priority 2: Manual Maintenance ---
            else if (statusType === 'maintenance') {
                statusLabel.innerText = "MAINTENANCE";
                statusLabel.className = "text-blue-400 font-black tracking-tighter transition-all duration-150";
                iconBox.innerHTML = ICONS.MAINT;
                card.className = "glass w-full max-w-md rounded-3xl p-8 relative overflow-hidden glow-blue";
                
                if (alarmArmed) {
                    currentLoop = setInterval(() => {
                        infoSynth.triggerAttackRelease(["G4", "B4"], "32n");
                    }, 4000);
                }
            }
            // --- Priority 3: Hard Offline ---
            else if (statusType === 'offline') {
                statusLabel.innerText = "NODE OFFLINE";
                statusLabel.className = "text-gray-500 font-black tracking-tighter transition-all duration-150";
                iconBox.innerHTML = ICONS.OFFLINE;
                card.className = "glass w-full max-w-md rounded-3xl p-8 relative overflow-hidden";
                
                if (alarmArmed) {
                    currentLoop = setInterval(() => {
                        heartbeatSynth.triggerAttackRelease("G0", "8n");
                    }, 3000);
                }
            }
            // --- Priority 4: Stable ---
            else if (statusType === 'online') {
                statusLabel.innerText = "STABLE";
                statusLabel.className = "text-green-400 font-black tracking-tighter transition-all duration-150";
                iconBox.innerHTML = ICONS.ONLINE;
                card.className = "glass w-full max-w-md rounded-3xl p-8 relative overflow-hidden glow-green";
                
                if (isRunning) {
                    heartbeatSynth.triggerAttackRelease("C1", "32n");
                    statusLabel.style.transform = "scale(1.05)";
                    setTimeout(() => statusLabel.style.transform = "scale(1)", 100);
                }
            }

        } catch (e) {
            document.getElementById('display-status').innerText = "LINK ERROR";
        }
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        if (!isRunning) {
            await Tone.start();
            isRunning = true;
            document.getElementById('start-btn').innerText = "MONITOR ACTIVE";
            document.getElementById('start-btn').className = "w-full py-4 bg-purple-600/10 border border-purple-500/50 text-purple-400 font-bold rounded-2xl transition-all uppercase text-xs tracking-[0.2em]";
            setInterval(updateMonitor, 2000);
            updateMonitor();
        }
    });

    document.getElementById('alarm-toggle').addEventListener('click', () => {
        alarmArmed = !alarmArmed;
        const btn = document.getElementById('alarm-toggle');
        btn.innerText = alarmArmed ? "[ ALARM ARMED ]" : "[ ALARM MUTED ]";
        btn.className = alarmArmed ? "text-[10px] text-green-500 font-bold uppercase" : "text-[10px] text-red-500 font-bold uppercase";
        if (!alarmArmed) clearInterval(currentLoop);
    });
</script>
</body>
</html>
