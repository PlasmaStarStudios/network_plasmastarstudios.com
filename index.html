<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Server Monitor v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #0f0c14; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 25, 35, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(90, 62, 116, 0.4); }
        
        /* Alarm States */
        .status-glow-green { box-shadow: 0 0 30px rgba(34, 197, 94, 0.15); border-color: #22c55e; }
        .status-glow-blue { box-shadow: 0 0 30px rgba(59, 130, 246, 0.15); border-color: #3b82f6; }
        
        /* Critical Red Pulse for the whole card */
        .alarm-active { 
            animation: danger-pulse 1.5s infinite; 
            border-color: #ef4444; 
        }
        @keyframes danger-pulse {
            0% { background-color: rgba(30, 25, 35, 0.9); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
            50% { background-color: rgba(60, 20, 20, 1); box-shadow: 0 0 40px rgba(239, 68, 68, 0.5); }
            100% { background-color: rgba(30, 25, 35, 0.9); box-shadow: 0 0 20px rgba(239, 68, 68, 0.2); }
        }

        .scanline {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, .3) 50%);
            background-size: 100% 4px; z-index: 10; pointer-events: none; opacity: 0.1;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app-container" class="glass w-full max-w-md rounded-2xl p-8 relative overflow-hidden transition-all duration-500">
        <div class="scanline"></div>
        
        <div class="flex justify-between items-start mb-10 relative z-20">
            <div>
                <h2 class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em]">Data Center Node</h2>
                <h1 class="text-2xl font-bold tracking-tight">SRV-LITE-01</h1>
            </div>
            <div id="icon-container" class="p-3 rounded-xl bg-white/5 border border-white/10">
                </div>
        </div>

        <div class="flex flex-col items-center py-6 relative z-20">
            <div id="pulse-wave" class="text-4xl font-extrabold tracking-tighter transition-all duration-200 mb-2">
                <span id="display-status">READY</span>
            </div>
            <div id="sync-timer" class="text-[10px] text-gray-500 font-bold uppercase">Sync Offset: --</div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6 relative z-20">
            <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                <span class="text-[9px] text-gray-500 font-bold block mb-1 uppercase">Thermal Core</span>
                <span id="temp-val" class="text-xl font-bold text-purple-300">--°C</span>
            </div>
            <div class="bg-black/30 p-4 rounded-xl border border-white/5">
                <span class="text-[9px] text-gray-500 font-bold block mb-1 uppercase">Power Draw</span>
                <span id="power-val" class="text-xl font-bold text-purple-300">--W</span>
            </div>
            <div class="bg-black/30 p-4 rounded-xl border border-white/5 col-span-2">
                <span class="text-[9px] text-gray-500 font-bold block mb-1 uppercase">System Uptime</span>
                <span id="uptime-val" class="text-xl font-bold text-blue-300">00:00:00</span>
            </div>
        </div>

        <div class="mt-8 space-y-3 relative z-20">
            <button id="start-btn" class="w-full py-4 bg-purple-600/20 hover:bg-purple-600/40 border border-purple-500/50 text-purple-100 font-bold rounded-xl transition-all uppercase text-xs tracking-widest">
                Initialize System
            </button>
            <div class="flex items-center justify-between px-2">
                <span class="text-[10px] text-gray-400 font-bold uppercase">Alarm System</span>
                <button id="alarm-toggle" class="text-[10px] text-red-500 font-bold uppercase hover:underline opacity-50 cursor-pointer">
                    Muted
                </button>
            </div>
        </div>
    </div>

<script>
    const API_URL = 'https://689cc60cce755fe69786fca8.mockapi.io/serverinfo';
    
    // Audio Setup
    const synth = new Tone.MembraneSynth({ volume: -10 }).toDestination();
    const alarmSynth = new Tone.Oscillator(800, "square").toDestination();
    
    let isRunning = false;
    let alarmArmed = false;
    let alarmInterval = null;

    const ICONS = {
        ONLINE: `<svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`,
        CRITICAL: `<svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`,
        MAINT: `<svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`
    };

    function triggerAlarmAudio(start) {
        if (start && alarmArmed) {
            if (!alarmInterval) {
                alarmInterval = setInterval(() => {
                    alarmSynth.frequency.value = 800;
                    alarmSynth.start().stop("+0.1");
                    setTimeout(() => {
                        alarmSynth.frequency.value = 600;
                        alarmSynth.start().stop("+0.1");
                    }, 200);
                }, 1000);
            }
        } else {
            clearInterval(alarmInterval);
            alarmInterval = null;
        }
    }

    async function updateMonitor() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            const server = data[0];
            
            const card = document.getElementById('app-container');
            const iconBox = document.getElementById('icon-container');
            const statusLabel = document.getElementById('display-status');
            const offsetLabel = document.getElementById('sync-timer');
            
            const timeDiff = Date.now() - parseInt(server.HARTHBEAT);
            offsetLabel.innerText = `Offset: ${timeDiff}ms`;

            // Data Update
            document.getElementById('temp-val').innerText = server.currenttemp;
            document.getElementById('power-val').innerText = server.powerconcumptionperH;
            document.getElementById('uptime-val').innerText = server.uptime;

            // Reset States
            card.classList.remove('status-glow-green', 'status-glow-blue', 'alarm-active');
            
            // Logic Check
            if (timeDiff > 10000) {
                statusLabel.innerText = "NO PULSE";
                statusLabel.className = "text-red-500 font-extrabold tracking-tighter transition-all duration-200 mb-2";
                iconBox.innerHTML = ICONS.CRITICAL;
                card.classList.add('alarm-active');
                triggerAlarmAudio(true);
            } else if (server.STATUS.toLowerCase() === 'maintenance') {
                statusLabel.innerText = "MAINTENANCE";
                statusLabel.className = "text-blue-400 font-extrabold tracking-tighter transition-all duration-200 mb-2";
                iconBox.innerHTML = ICONS.MAINT;
                card.classList.add('status-glow-blue');
                triggerAlarmAudio(false);
            } else if (server.STATUS.toLowerCase() === 'online') {
                statusLabel.innerText = "STABLE";
                statusLabel.className = "text-green-400 font-extrabold tracking-tighter transition-all duration-200 mb-2";
                iconBox.innerHTML = ICONS.ONLINE;
                card.classList.add('status-glow-green');
                triggerAlarmAudio(false);
                if(isRunning) synth.triggerAttackRelease("C1", "32n");
            }

        } catch (e) {
            document.getElementById('display-status').innerText = "API ERROR";
        }
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
        if (!isRunning) {
            await Tone.start();
            isRunning = true;
            document.getElementById('start-btn').innerText = "SYSTEM ARMED";
            setInterval(updateMonitor, 2000);
            updateMonitor();
        }
    });

    document.getElementById('alarm-toggle').addEventListener('click', () => {
        alarmArmed = !alarmArmed;
        const btn = document.getElementById('alarm-toggle');
        btn.innerText = alarmArmed ? "Armed & Ready" : "Muted";
        btn.className = alarmArmed ? "text-[10px] text-green-500 font-bold uppercase hover:underline opacity-100 cursor-pointer" : "text-[10px] text-red-500 font-bold uppercase hover:underline opacity-50 cursor-pointer";
        if (!alarmArmed) triggerAlarmAudio(false);
    });
</script>
</body>
</html>
